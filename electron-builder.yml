appId: com.tucajero.pos
productName: TuCajero
directories:
  output: release
files:
  - dist/**/*
  - node_modules/**/*
  - package.json
  - from: app/main/repositories/generated-client
    to: dist/main/app/main/repositories/generated-client
  - database/tucajero.db
  - "!node_modules/@types/**/*"
  - "!node_modules/.bin/**/*"
  - "!node_modules/typescript/**/*"
  - "!**/*.ts"
  - "!**/*.tsx"
  - "!**/*.map"
  - "!**/*.md"
  - "!**/*.txt"
  - "!**/tests/**/*"
  - "!**/docs/**/*"
asar: true
asarUnpack:
  - "**/*.node"
  - "node_modules/better-sqlite3/**/*"
win:
  target:
    - nsis
    - portable
  icon: build/icon.ico
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  shortcutName: TuCajero
  createStartMenuShortcut: true
compression: maximum
